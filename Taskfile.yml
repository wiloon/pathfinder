version: "3"

tasks:
  default:
    cmds:
      - task --list

  api:
    desc: Start the backend API server locally
    dir: pathfinder-api
    cmds:
      - go run main.go

  ui:
    desc: Start the frontend dev server locally
    dir: pathfinder-ui
    cmds:
      - pnpm install
      - pnpm dev

  test:
    desc: Run all backend unit and integration tests
    dir: pathfinder-api
    cmds:
      - go test ./user/ ./goal/ ./checkin/ -v -count=1

  test:short:
    desc: Run backend tests (no verbose output)
    dir: pathfinder-api
    cmds:
      - go test ./user/ ./goal/ ./checkin/ -count=1

  test:cover:
    desc: Run backend tests with coverage report
    dir: pathfinder-api
    cmds:
      - go test ./user/ ./goal/ ./checkin/ -count=1 -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  test:e2e:install:
    desc: Install Playwright browsers (run once before test:e2e)
    dir: pathfinder-ui
    cmds:
      - pnpm exec playwright install

  test:e2e:
    desc: Run Playwright E2E tests (requires dev server and browsers installed)
    dir: pathfinder-ui
    cmds:
      - pnpm exec playwright install
      - pnpm test:e2e

  ci:api:
    desc: "Manually trigger Tekton build for pathfinder-api. Usage: task ci:api [REV=<branch>]"
    vars:
      REV:
        sh: '[ -n "{{.REV}}" ] && echo "{{.REV}}" || git rev-parse --abbrev-ref HEAD'
    cmds:
      - |
        kubectl create -f - <<EOF
        apiVersion: tekton.dev/v1beta1
        kind: PipelineRun
        metadata:
          generateName: build-pathfinder-api-manual-
          namespace: tekton-pipelines
        spec:
          pipelineRef:
            name: build-pathfinder-api
          serviceAccountName: tekton-bot
          params:
          - name: git-revision
            value: "{{.REV}}"
          workspaces:
          - name: source-code
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 500Mi
          - name: gitops-code
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 200Mi
          - name: ssh-directory
            secret:
              secretName: git-ssh-key
          - name: docker-credentials
            secret:
              secretName: nexus-docker-cred
          podTemplate:
            nodeSelector:
              kubernetes.io/hostname: k8s-71
          timeout: 1h
        EOF

  ci:ui:
    desc: "Manually trigger Tekton build for pathfinder-ui. Usage: task ci:ui [REV=<branch>]"
    vars:
      REV:
        sh: '[ -n "{{.REV}}" ] && echo "{{.REV}}" || git rev-parse --abbrev-ref HEAD'
    cmds:
      - |
        kubectl create -f - <<EOF
        apiVersion: tekton.dev/v1beta1
        kind: PipelineRun
        metadata:
          generateName: build-pathfinder-ui-manual-
          namespace: tekton-pipelines
        spec:
          pipelineRef:
            name: build-pathfinder-ui
          serviceAccountName: tekton-bot
          params:
          - name: git-revision
            value: "{{.REV}}"
          workspaces:
          - name: source-code
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 1Gi
          - name: gitops-code
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 200Mi
          - name: ssh-directory
            secret:
              secretName: git-ssh-key
          - name: docker-credentials
            secret:
              secretName: nexus-docker-cred
          podTemplate:
            nodeSelector:
              kubernetes.io/hostname: k8s-71
          timeout: 2h
        EOF

  ci:
    desc: "Manually trigger both API and UI Tekton builds. Usage: task ci [REV=<branch>]"
    cmds:
      - task: ci:api
        vars:
          REV: '{{.REV}}'
      - task: ci:ui
        vars:
          REV: '{{.REV}}'
